<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登记收款 - 租赁管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-building"></i> 租赁管理</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('index') }}" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('customers') }}" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>客户管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rooms') }}" class="nav-link">
                        <i class="fas fa-door-open"></i>
                        <span>房间管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('contracts') }}" class="nav-link">
                        <i class="fas fa-file-contract"></i>
                        <span>合同管理</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="{{ url_for('payments') }}" class="nav-link">
                        <i class="fas fa-money-bill-wave"></i>
                        <span>收款管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rent_plans') }}" class="nav-link">
                        <i class="fas fa-calendar-alt"></i>
                        <span>租金计划</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('statistics') }}" class="nav-link">
                        <i class="fas fa-chart-bar"></i>
                        <span>统计分析</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('import_data') }}" class="nav-link">
                        <i class="fas fa-upload"></i>
                        <span>数据导入</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="header-content">
                    <h1>登记收款</h1>
                    <div class="header-actions">
                        <button class="btn btn-secondary" onclick="goBack()">
                            <i class="fas fa-arrow-left"></i> 返回
                        </button>
                    </div>
                </div>
            </header>

            <div class="dashboard">
                <div class="table-container">
                    <div class="table-header">
                        <h2>收款信息</h2>
                    </div>
                    <div class="modal-body">
                        <form id="paymentForm">
                            <div class="form-group">
                                <label>选择合同</label>
                                <select id="contract_id" name="contract_id" required>
                                    <option value="">请选择合同</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>选择租金计划</label>
                                <select id="rent_plan_id" name="rent_plan_id" required>
                                    <option value="">请先选择合同</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>收款金额 (元)</label>
                                <input type="number" id="amount" name="amount" step="0.01" min="0" required>
                            </div>
                            
                            <div class="form-group">
                                <label>收款日期</label>
                                <input type="datetime-local" id="payment_date" name="payment_date" required>
                            </div>
                            
                            <div class="form-group">
                                <label>收款方式</label>
                                <select id="payment_method" name="payment_method" required>
                                    <option value="">请选择收款方式</option>
                                    <option value="银行转账">银行转账</option>
                                    <option value="现金">现金</option>
                                    <option value="支票">支票</option>
                                    <option value="支付宝">支付宝</option>
                                    <option value="微信支付">微信支付</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>备注</label>
                                <textarea id="remarks" name="remarks" placeholder="请输入备注信息..."></textarea>
                            </div>
                            
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> 保存收款
                                </button>
                                <button type="button" class="btn btn-secondary" onclick="goBack()">
                                    取消
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        function goBack() {
            location.href = '{{ url_for("payments") }}';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            const localDateTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            document.getElementById('payment_date').value = localDateTime;
            
            loadContracts();
            
            document.getElementById('contract_id').addEventListener('change', function() {
                loadRentPlans(this.value);
            });
            
            document.getElementById('paymentForm').addEventListener('submit', function(e) {
                e.preventDefault();
                submitPayment();
            });
        });
        
        function loadContracts() {
            fetch('/api/contracts')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('contract_id');
                    select.innerHTML = '<option value="">请选择合同</option>';
                    
                    data.contracts.forEach(contract => {
                        const option = document.createElement('option');
                        option.value = contract.id;
                        option.textContent = `${contract.contract_number} - ${contract.customer.company_name} - ${contract.room ? contract.room.room_number : '未知房间'}`;
                        select.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('加载合同列表失败:', error);
                    showNotification('加载合同列表失败', 'error');
                });
        }
        
        function loadRentPlans(contractId) {
            if (!contractId) {
                document.getElementById('rent_plan_id').innerHTML = '<option value="">请先选择合同</option>';
                return;
            }
            
            fetch(`/api/rent_plans?contract_id=${contractId}`)
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('rent_plan_id');
                    select.innerHTML = '<option value="">请选择租金计划</option>';
                    
                    data.rent_plans.forEach(plan => {
                        const option = document.createElement('option');
                        option.value = plan.id;
                        option.textContent = `${plan.year}年${plan.month}月 - 应收${plan.amount}元 - ${plan.status}`;
                        select.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('加载租金计划失败:', error);
                    showNotification('加载租金计划失败', 'error');
                });
        }
        
        function submitPayment() {
            const formData = new FormData(document.getElementById('paymentForm'));
            
            // 验证表单数据
            const contract_id = formData.get('contract_id');
            const rent_plan_id = formData.get('rent_plan_id');
            const amount = parseFloat(formData.get('amount'));
            const payment_date = formData.get('payment_date');
            const payment_method = formData.get('payment_method');
            
            if (!contract_id) {
                showNotification('请选择合同', 'error');
                return;
            }
            if (!rent_plan_id) {
                showNotification('请选择租金计划', 'error');
                return;
            }
            if (!amount || amount <= 0) {
                showNotification('请输入有效的收款金额', 'error');
                return;
            }
            if (!payment_date) {
                showNotification('请选择收款日期', 'error');
                return;
            }
            if (!payment_method) {
                showNotification('请选择收款方式', 'error');
                return;
            }
            
            const data = {
                contract_id: contract_id,
                rent_plan_id: rent_plan_id,
                amount: amount,
                payment_date: payment_date,
                payment_method: payment_method,
                remarks: formData.get('remarks') || ''
            };
            
            console.log('提交数据:', data);
            
            fetch('/payments/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(result => {
                if (result.success) {
                    showNotification('收款登记成功！', 'success');
                    setTimeout(() => {
                        location.href = '/payments';
                    }, 1000);
                } else {
                    showNotification('收款登记失败：' + result.message, 'error');
                }
            })
            .catch(error => {
                console.error('提交失败:', error);
                showNotification('提交失败，请重试。错误信息：' + error.message, 'error');
            });
        }
    </script>
</body>
</html>
