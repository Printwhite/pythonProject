<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 租赁管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="error-title">{{ error_title or '系统错误' }}</h1>
            <p class="error-message">{{ error_message or '抱歉，系统遇到了一个错误。' }}</p>
            <div class="error-details">
                {% if error_code %}
                <p><strong>错误代码:</strong> {{ error_code }}</p>
                {% endif %}
                {% if error_description %}
                <p><strong>错误描述:</strong> {{ error_description }}</p>
                {% endif %}
            </div>
            <div class="error-actions">
                <button class="btn btn-primary" onclick="history.back()">
                    <i class="fas fa-arrow-left"></i> 返回上一页
                </button>
                <button class="btn btn-secondary" onclick="location.href='/'">
                    <i class="fas fa-home"></i> 返回首页
                </button>
                <button class="btn btn-info" onclick="location.reload()">
                    <i class="fas fa-redo"></i> 重新加载
                </button>
            </div>
            {% if show_contact %}
            <div class="error-contact">
                <p>如果问题持续存在，请联系系统管理员。</p>
                <p><i class="fas fa-envelope"></i> support@example.com</p>
            </div>
            {% endif %}
        </div>
    </div>

    <style>
        .error-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .error-icon {
            font-size: 4rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        
        .error-title {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .error-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .error-details p {
            margin: 8px 0;
            color: #555;
        }
        
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .error-contact {
            border-top: 1px solid #eee;
            padding-top: 20px;
            color: #888;
        }
        
        .error-contact p {
            margin: 5px 0;
        }
        
        @media (max-width: 768px) {
            .error-container {
                margin: 50px 20px;
                padding: 30px 20px;
            }
            
            .error-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .error-actions .btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</body>
</html>
