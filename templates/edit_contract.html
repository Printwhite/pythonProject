<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑合同 - 租赁管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-building"></i> 租赁管理</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('index') }}" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('customers') }}" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>客户管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rooms') }}" class="nav-link">
                        <i class="fas fa-door-open"></i>
                        <span>房间管理</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="{{ url_for('contracts') }}" class="nav-link">
                        <i class="fas fa-file-contract"></i>
                        <span>合同管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('payments') }}" class="nav-link">
                        <i class="fas fa-money-bill-wave"></i>
                        <span>收款管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rent_plans') }}" class="nav-link">
                        <i class="fas fa-calendar-alt"></i>
                        <span>租金计划</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('statistics') }}" class="nav-link">
                        <i class="fas fa-chart-bar"></i>
                        <span>统计分析</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('import_data') }}" class="nav-link">
                        <i class="fas fa-upload"></i>
                        <span>数据导入</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="header-content">
                    <h1>编辑合同</h1>
                    <div class="header-actions">
                        <button class="btn btn-secondary" onclick="goToContracts()">
                            <i class="fas fa-arrow-left"></i> 返回
                        </button>
                    </div>
                </div>
            </header>

            <div class="dashboard">
                <div class="table-container">
                    <div class="table-header">
                        <h2>合同信息</h2>
                    </div>
                    <div class="modal-body">
                        <form id="contractForm">
                            <div class="form-group">
                                <label>合同编号</label>
                                <input type="text" name="contract_number" value="{{ contract.contract_number }}" required>
                            </div>
                            <div class="form-group">
                                <label>客户</label>
                                <select name="customer_id" required>
                                    <option value="">选择客户</option>
                                    {% for customer in customers %}
                                    <option value="{{ customer.id }}" {% if customer.id == contract.customer_id %}selected{% endif %}>
                                        {{ customer.company_name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>房间</label>
                                <select name="room_id" required>
                                    <option value="">选择房间</option>
                                    {% for room in rooms %}
                                    <option value="{{ room.id }}" {% if room.id == contract.room_id %}selected{% endif %}>
                                        {{ room.room_number }} ({{ room.area }}㎡)
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>租期开始</label>
                                <input type="date" name="start_date" value="{{ contract.start_date.strftime('%Y-%m-%d') }}" required>
                            </div>
                            <div class="form-group">
                                <label>租期结束</label>
                                <input type="date" name="end_date" value="{{ contract.end_date.strftime('%Y-%m-%d') }}" required>
                            </div>
                            <div class="form-group">
                                <label>租金单价 (元/㎡/月)</label>
                                <input type="number" step="0.01" name="unit_price" value="{{ contract.unit_price }}" required>
                            </div>
                            <div class="form-group">
                                <label>支付方式</label>
                                <select name="payment_frequency" required>
                                    <option value="月付" {% if contract.payment_frequency == '月付' %}selected{% endif %}>月付</option>
                                    <option value="季付" {% if contract.payment_frequency == '季付' %}selected{% endif %}>季付</option>
                                    <option value="半年付" {% if contract.payment_frequency == '半年付' %}selected{% endif %}>半年付</option>
                                    <option value="年付" {% if contract.payment_frequency == '年付' %}selected{% endif %}>年付</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>合同约定保证金</label>
                                <input type="number" step="0.01" name="deposit_contract" value="{{ contract.deposit_contract }}" required>
                            </div>
                            <div class="form-group">
                                <label>实收保证金</label>
                                <input type="number" step="0.01" name="deposit_received" value="{{ contract.deposit_received }}" required>
                            </div>
                            <div class="form-group">
                                <label>付款日</label>
                                <input type="number" name="payment_day" min="1" max="31" value="{{ contract.payment_day }}" required>
                            </div>
                            <div class="form-group">
                                <label>收款方式</label>
                                <select name="payment_method" required>
                                    <option value="银行转账" {% if contract.payment_method == '银行转账' %}selected{% endif %}>银行转账</option>
                                    <option value="现金" {% if contract.payment_method == '现金' %}selected{% endif %}>现金</option>
                                    <option value="支票" {% if contract.payment_method == '支票' %}selected{% endif %}>支票</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>开票方式</label>
                                <select name="invoice_method" required>
                                    <option value="月结" {% if contract.invoice_method == '月结' %}selected{% endif %}>月结</option>
                                    <option value="季结" {% if contract.invoice_method == '季结' %}selected{% endif %}>季结</option>
                                    <option value="半年结" {% if contract.invoice_method == '半年结' %}selected{% endif %}>半年结</option>
                                    <option value="年结" {% if contract.invoice_method == '年结' %}selected{% endif %}>年结</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>备注</label>
                                <textarea name="remarks" rows="3">{{ contract.remarks or '' }}</textarea>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary" onclick="return confirmContractUpdate()">
                                    <i class="fas fa-save"></i> 更新
                                </button>
                                <button type="button" class="btn btn-secondary" onclick="goToContracts()">
                                    取消
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        function goToContracts() {
            location.href = '{{ url_for("contracts") }}';
        }
        
        function confirmContractUpdate() {
            const form = document.getElementById('contractForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            // 检查必填字段
            if (!data.contract_number || !data.customer_id || !data.room_id || !data.start_date || !data.end_date) {
                showNotification('⚠️ 请填写所有必填字段', 'warning');
                return false;
            }
            
            // 检查日期
            const startDate = new Date(data.start_date);
            const endDate = new Date(data.end_date);
            if (endDate <= startDate) {
                showNotification('⚠️ 租期结束日期必须晚于开始日期', 'warning');
                return false;
            }
            
            if (!confirm(`📋 合同更新确认\n\n您即将更新合同：${data.contract_number}\n\n此操作将：\n• 更新合同信息\n• 重新生成租金计划\n• 可能影响现有收款记录\n• 发送相关通知\n\n确定要更新吗？`)) {
                return false;
            }
            
            return true;
        }
        
        document.getElementById('contractForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            fetch('{{ url_for("edit_contract", contract_id=contract.id) }}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showNotification(result.message, 'success');
                    setTimeout(() => {
                        location.href = '/contracts';
                    }, 1000);
                } else {
                    showNotification(result.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
