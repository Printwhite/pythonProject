<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加客户 - 租赁管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-building"></i> 租赁管理</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('index') }}" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="{{ url_for('customers') }}" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>客户管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rooms') }}" class="nav-link">
                        <i class="fas fa-door-open"></i>
                        <span>房间管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('contracts') }}" class="nav-link">
                        <i class="fas fa-file-contract"></i>
                        <span>合同管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('payments') }}" class="nav-link">
                        <i class="fas fa-money-bill-wave"></i>
                        <span>收款管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rent_plans') }}" class="nav-link">
                        <i class="fas fa-calendar-alt"></i>
                        <span>租金计划</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('statistics') }}" class="nav-link">
                        <i class="fas fa-chart-bar"></i>
                        <span>统计分析</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('import_data') }}" class="nav-link">
                        <i class="fas fa-upload"></i>
                        <span>数据导入</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="header-content">
                    <h1>添加客户</h1>
                    <div class="header-actions">
                        <button class="btn btn-secondary" onclick="goBack()">
                            <i class="fas fa-arrow-left"></i> 返回
                        </button>
                    </div>
                </div>
            </header>

            <div class="dashboard">
                <div class="table-container">
                    <div class="table-header">
                        <h2>客户信息</h2>
                    </div>
                    <div class="modal-body">
                        <form id="customerForm">
                            <div class="form-group">
                                <label>客户ID</label>
                                <input type="text" name="customer_id" id="customer_id" required>
                            </div>
                            <div class="form-group">
                                <label>公司名称</label>
                                <input type="text" name="company_name" required>
                            </div>
                            <div class="form-group">
                                <label>联系人</label>
                                <input type="text" name="contact_person" required>
                            </div>
                            <div class="form-group">
                                <label>联系电话</label>
                                <input type="tel" name="contact_phone" required>
                            </div>
                            <div class="form-group">
                                <label>邮箱</label>
                                <input type="email" name="contact_email">
                            </div>
                            <div class="form-group">
                                <label>垫入成本</label>
                                <input type="number" name="advance_cost" step="0.01" min="0" value="0">
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> 保存
                                </button>
                                <button type="button" class="btn btn-secondary" onclick="goBack()">
                                    取消
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        function goBack() {
            location.href = '{{ url_for("customers") }}';
        }
        
        function generateCustomerId() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `CUST${year}${month}${day}${hours}${minutes}${seconds}`;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('customer_id').value = generateCustomerId();
        });
        
        document.getElementById('customerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            fetch('/customers/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showNotification(result.message, 'success');
                    setTimeout(() => {
                        location.href = '/customers';
                    }, 1000);
                } else {
                    showNotification(result.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
