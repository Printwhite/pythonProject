<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租赁管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-building"></i> 租赁管理</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active">
                    <a href="{{ url_for('index') }}" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('customers') }}" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>客户管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rooms') }}" class="nav-link">
                        <i class="fas fa-door-open"></i>
                        <span>房间管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('contracts') }}" class="nav-link">
                        <i class="fas fa-file-contract"></i>
                        <span>合同管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('payments') }}" class="nav-link">
                        <i class="fas fa-money-bill-wave"></i>
                        <span>收款管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('rent_plans') }}" class="nav-link">
                        <i class="fas fa-calendar-alt"></i>
                        <span>租金计划</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('statistics') }}" class="nav-link">
                        <i class="fas fa-chart-bar"></i>
                        <span>统计分析</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('import_data') }}" class="nav-link">
                        <i class="fas fa-upload"></i>
                        <span>数据导入</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <div class="header-content">
                    <h1>租赁管理系统</h1>
                    <div class="header-actions">
                        <button class="btn btn-primary" onclick="showQuickAdd()">
                            <i class="fas fa-plus"></i> 快速添加
                        </button>
                    </div>
                </div>
            </header>

            <div class="dashboard">
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="totalCustomers">0</h3>
                            <p>总客户数</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-door-open"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="totalRooms">0</h3>
                            <p>总房间数</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-file-contract"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="activeContracts">0</h3>
                            <p>有效合同</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-money-bill-wave"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="monthlyRevenue">¥0</h3>
                            <p>本月收入</p>
                        </div>
                    </div>
                </div>

                <!-- 快捷操作 -->
                <div class="quick-actions">
                    <h2>快捷操作</h2>
                    <div class="action-grid">
                        <div class="action-card" onclick="goToAddCustomer()">
                            <i class="fas fa-user-plus"></i>
                            <h3>添加客户</h3>
                            <p>新增客户信息</p>
                        </div>
                        <div class="action-card" onclick="goToAddRoom()">
                            <i class="fas fa-door-open"></i>
                            <h3>添加房间</h3>
                            <p>新增房间信息</p>
                        </div>
                        <div class="action-card" onclick="goToAddContract()">
                            <i class="fas fa-file-signature"></i>
                            <h3>签订合同</h3>
                            <p>创建新合同</p>
                        </div>
                        <div class="action-card" onclick="goToAddPayment()">
                            <i class="fas fa-cash-register"></i>
                            <h3>登记收款</h3>
                            <p>记录租金收款</p>
                        </div>
                    </div>
                </div>

                <!-- 最近活动 -->
                <div class="recent-activities">
                    <h2>最近活动</h2>
                    <div class="activity-list" id="activityList">
                        <!-- 动态加载活动 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 快速添加模态框 -->
    <div id="quickAddModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>快速添加</h2>
                <span class="close" onclick="closeQuickAdd()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="quick-add-tabs">
                    <button class="tab-btn active" onclick="showTab('customer')">客户</button>
                    <button class="tab-btn" onclick="showTab('room')">房间</button>
                    <button class="tab-btn" onclick="showTab('contract')">合同</button>
                </div>
                
                <div id="customerTab" class="tab-content active">
                    <form id="quickCustomerForm">
                        <div class="form-group">
                            <label>公司名称</label>
                            <input type="text" name="company_name" required>
                        </div>
                        <div class="form-group">
                            <label>联系人</label>
                            <input type="text" name="contact_person" required>
                        </div>
                        <div class="form-group">
                            <label>联系电话</label>
                            <input type="tel" name="contact_phone" required>
                        </div>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" name="contact_email">
                        </div>
                        <button type="submit" class="btn btn-primary">添加客户</button>
                    </form>
                </div>
                
                <div id="roomTab" class="tab-content">
                    <form id="quickRoomForm">
                        <div class="form-group">
                            <label>房间号</label>
                            <input type="text" name="room_number" required>
                        </div>
                        <div class="form-group">
                            <label>面积 (㎡)</label>
                            <input type="number" step="0.01" name="area" required>
                        </div>
                        <div class="form-group">
                            <label>楼层</label>
                            <input type="text" name="floor" required>
                        </div>
                        <div class="form-group">
                            <label>单价 (元/㎡/月)</label>
                            <input type="number" step="0.01" name="unit_price" required>
                        </div>
                        <button type="submit" class="btn btn-primary">添加房间</button>
                    </form>
                </div>
                
                <div id="contractTab" class="tab-content">
                    <form id="quickContractForm">
                        <div class="form-group">
                            <label>合同编号</label>
                            <input type="text" name="contract_number" required>
                        </div>
                        <div class="form-group">
                            <label>客户</label>
                            <select name="customer_id" required>
                                <option value="">选择客户</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>房间</label>
                            <select name="room_id" required>
                                <option value="">选择房间</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>租期开始</label>
                            <input type="date" name="start_date" required>
                        </div>
                        <div class="form-group">
                            <label>租期结束</label>
                            <input type="date" name="end_date" required>
                        </div>
                        <div class="form-group">
                            <label>租金单价 (元/㎡/月)</label>
                            <input type="number" step="0.01" name="unit_price" required>
                        </div>
                        <button type="submit" class="btn btn-primary">创建合同</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // 确保所有跳转函数都可用
        function goToAddCustomer() {
            window.location.href = '/customers';
        }
        
        function goToAddRoom() {
            window.location.href = '/rooms';
        }
        
        function goToAddContract() {
            window.location.href = '/contracts';
        }
        
        function goToAddPayment() {
            window.location.href = '/payments/add';
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('仪表盘页面加载完成');
        });
    </script>
</body>
</html>
